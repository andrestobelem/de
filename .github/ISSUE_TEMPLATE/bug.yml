name: Bug report
description: Report reproducible behavior that differs from what users expect
title: "bug: "
labels:
  - bug
  - needs-triage
body:
  - type: textarea
    id: happened
    attributes:
      label: What happened?
      description: Describe the observed behavior from the user's perspective.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: Describe the behavior you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the smallest deterministic sequence that demonstrates the problem.
      placeholder: |
        1. Open …
        2. Choose …
        3. Observe …
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include environment, frequency, screenshots, or other observations that affect reproduction.
