name: Continuous integration

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CI: true
  HUSKY: 0
  RELEASE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  commit-stage:
    name: Commit stage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the source commit
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_SHA }}

      - name: Install pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: 10.33.2
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate commit messages
        env:
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            pnpm exec commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose
          elif [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            pnpm exec commitlint --from "$BEFORE_SHA" --to "$GITHUB_SHA" --verbose
          else
            pnpm exec commitlint --last --verbose
          fi

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Build once
        env:
          VITE_RELEASE_SHA: ${{ env.RELEASE_SHA }}
        run: pnpm build

      - name: Create Vercel Build Output
        run: pnpm release:prepare

      - name: Package immutable release candidate
        run: |
          tar \
            --sort=name \
            --mtime='UTC 1970-01-01' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -czf release.tgz \
            -C .vercel output
          sha256sum release.tgz > release.tgz.sha256

      - name: Upload release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ env.RELEASE_SHA }}
          path: |
            release.tgz
            release.tgz.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  acceptance:
    name: Artifact acceptance
    needs: commit-stage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the source commit
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ env.RELEASE_SHA }}

      - name: Install pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: 10.33.2
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download release candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-${{ env.RELEASE_SHA }}

      - name: Verify and unpack release candidate
        run: pnpm release:verify -- release.tgz release.tgz.sha256 "$RELEASE_SHA" .vercel

      - name: Install acceptance-test browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Test the packaged artifact through its public interface
        env:
          EXPECTED_RELEASE: ${{ env.RELEASE_SHA }}
          WEB_SERVER_COMMAND: pnpm release:serve
        run: pnpm test:e2e

      - name: Upload browser-test diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ env.RELEASE_SHA }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
