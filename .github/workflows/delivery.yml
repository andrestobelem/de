name: Continuous delivery

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: delivery-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CI: true
  HUSKY: 0

jobs:
  commit-stage:
    name: Commit stage
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: 10.33.2
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate commit messages
        env:
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            pnpm exec commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose
          elif [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            pnpm exec commitlint --from "$BEFORE_SHA" --to "$GITHUB_SHA" --verbose
          else
            pnpm exec commitlint --last --verbose
          fi

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Build once
        env:
          VITE_RELEASE_SHA: ${{ github.sha }}
        run: pnpm build

      - name: Create Vercel Build Output
        run: pnpm release:prepare

      - name: Package immutable release candidate
        run: |
          tar \
            --sort=name \
            --mtime='UTC 1970-01-01' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -czf release.tgz \
            -C .vercel output
          sha256sum release.tgz > release.tgz.sha256

      - name: Upload release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ github.sha }}
          path: |
            release.tgz
            release.tgz.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  acceptance:
    name: Artifact acceptance
    needs: commit-stage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: 10.33.2
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download release candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-${{ github.sha }}

      - name: Verify and unpack release candidate
        run: |
          sha256sum --check release.tgz.sha256
          mkdir -p .vercel
          tar -xzf release.tgz -C .vercel

      - name: Install acceptance-test browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Test the packaged artifact through its public interface
        env:
          EXPECTED_RELEASE: ${{ github.sha }}
          WEB_SERVER_COMMAND: pnpm release:serve
        run: pnpm test:e2e

      - name: Upload browser-test diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  deploy-preview:
    name: Deploy preview
    needs: acceptance
    if: >-
      vars.VERCEL_ENABLED == 'true' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: 10.33.2
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download verified release candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-${{ github.sha }}

      - name: Verify and unpack release candidate
        run: |
          sha256sum --check release.tgz.sha256
          mkdir -p .vercel
          tar -xzf release.tgz -C .vercel

      - name: Deploy the prebuilt artifact
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deploy_output="$(
            pnpm exec vercel deploy \
              --prebuilt \
              --target=preview \
              --archive=tgz \
              --non-interactive \
              --no-color \
              --token="$VERCEL_TOKEN" \
              2>&1
          )"
          printf '%s\n' "$deploy_output"
          deployment_url="$(
            grep --only-matching --extended-regexp \
              'https://[a-zA-Z0-9.-]+\.vercel\.app' \
              <<< "$deploy_output" \
              | head -n 1
          )"

          if [[ ! "$deployment_url" =~ ^https://[a-zA-Z0-9.-]+\.vercel\.app$ ]]; then
            echo "Unexpected deployment URL: $deployment_url" >&2
            exit 1
          fi

          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "### Preview deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "$deployment_url" >> "$GITHUB_STEP_SUMMARY"

  preview-smoke:
    name: Preview smoke
    needs: deploy-preview
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Smoke-test the preview release identity
        env:
          BASE_URL: ${{ needs.deploy-preview.outputs.url }}
          EXPECTED_RELEASE: ${{ github.sha }}
        run: node scripts/smoke-release.mjs

  production:
    name: Promote and verify production
    needs: [deploy-preview, preview-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: production
      cancel-in-progress: false
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: 10.33.2
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Promote the verified preview without rebuilding
        env:
          DEPLOYMENT_URL: ${{ needs.deploy-preview.outputs.url }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          pnpm exec vercel promote "$DEPLOYMENT_URL" \
            --yes \
            --timeout=5m \
            --non-interactive \
            --no-color \
            --token="$VERCEL_TOKEN"

          echo "### Production promotion" >> "$GITHUB_STEP_SUMMARY"
          echo "Promoted $DEPLOYMENT_URL without rebuilding." >> "$GITHUB_STEP_SUMMARY"

      - name: Verify the promoted release identity in production
        env:
          BASE_URL: ${{ vars.PRODUCTION_URL }}
          EXPECTED_RELEASE: ${{ github.sha }}
        run: node scripts/smoke-release.mjs
