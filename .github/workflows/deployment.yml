name: Continuous deployment

on:
  workflow_run:
    workflows: [Continuous integration]
    types: [completed]

permissions:
  actions: read
  contents: read
  statuses: write

concurrency:
  group: deployment-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: ${{ github.event.workflow_run.head_branch != 'main' }}

env:
  CI: true
  HUSKY: 0
  RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}

jobs:
  initialize:
    name: Authorize accepted release
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      vars.VERCEL_ENABLED == 'true' &&
      ((github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main') ||
      github.event.workflow_run.event == 'pull_request')
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Mark trusted preview checks pending
        if: github.event.workflow_run.event == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$RELEASE_SHA" \
            --field state=pending \
            --field context='Deploy preview' \
            --field description='Trusted deployment is starting' \
            --field target_url="$RUN_URL"
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$RELEASE_SHA" \
            --field state=pending \
            --field context='Preview smoke' \
            --field description='Waiting for trusted deployment' \
            --field target_url="$RUN_URL"

  deploy-preview:
    name: Deploy accepted preview
    needs: initialize
    if: >-
      needs.initialize.result == 'success' &&
      ((github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main') ||
      github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Check out trusted deployment code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: 10.33.2
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install trusted deployment dependencies
        run: pnpm install --frozen-lockfile

      - name: Download the accepted release candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-${{ env.RELEASE_SHA }}
          path: ${{ runner.temp }}/candidate
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Validate the untrusted archive before extraction
        env:
          RELEASE_DIRECTORY: ${{ runner.temp }}/release
        run: |
          mkdir "$RELEASE_DIRECTORY"
          pnpm release:verify -- \
            "$RUNNER_TEMP/candidate/release.tgz" \
            "$RUNNER_TEMP/candidate/release.tgz.sha256" \
            "$RELEASE_SHA" \
            "$RELEASE_DIRECTORY/.vercel"

      - name: Deploy the prebuilt artifact from trusted code
        id: deploy
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RELEASE_DIRECTORY: ${{ runner.temp }}/release
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deploy_output="$(
            pnpm exec vercel deploy \
              --cwd="$RELEASE_DIRECTORY" \
              --prebuilt \
              --target=preview \
              --archive=tgz \
              --meta="githubCommitSha=$RELEASE_SHA" \
              --meta="githubCommitRef=$HEAD_BRANCH" \
              --non-interactive \
              --no-color \
              --token="$VERCEL_TOKEN" \
              2>&1
          )"
          printf '%s\n' "$deploy_output"
          deployment_url="$(
            grep --only-matching --extended-regexp \
              'https://[a-zA-Z0-9.-]+\.vercel\.app' \
              <<< "$deploy_output" \
              | head -n 1
          )"

          if [[ ! "$deployment_url" =~ ^https://[a-zA-Z0-9.-]+\.vercel\.app$ ]]; then
            echo "Unexpected deployment URL: $deployment_url" >&2
            exit 1
          fi

          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "### Preview deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "$deployment_url" >> "$GITHUB_STEP_SUMMARY"

  preview-smoke:
    name: Verify preview release
    needs: deploy-preview
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out trusted smoke-test code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Smoke-test the preview release identity
        env:
          BASE_URL: ${{ needs.deploy-preview.outputs.url }}
          EXPECTED_RELEASE: ${{ env.RELEASE_SHA }}
        run: node scripts/smoke-release.mjs

  preview-status:
    name: Report preview result
    needs: [initialize, deploy-preview, preview-smoke]
    if: >-
      always() &&
      github.event.workflow_run.event == 'pull_request' &&
      needs.initialize.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Report trusted preview checks
        env:
          DEPLOY_RESULT: ${{ needs.deploy-preview.result }}
          GH_TOKEN: ${{ github.token }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SAME_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name == github.repository }}
          SMOKE_RESULT: ${{ needs.preview-smoke.result }}
        run: |
          if [[ "$SAME_REPOSITORY" != "true" ]]; then
            deploy_state=success
            deploy_description='Skipped for an untrusted fork'
            smoke_state=success
            smoke_description='Skipped for an untrusted fork'
          else
            [[ "$DEPLOY_RESULT" == "success" ]] && deploy_state=success || deploy_state=failure
            [[ "$SMOKE_RESULT" == "success" ]] && smoke_state=success || smoke_state=failure
            deploy_description="Trusted deployment $DEPLOY_RESULT"
            smoke_description="Release smoke $SMOKE_RESULT"
          fi

          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$RELEASE_SHA" \
            --field state="$deploy_state" \
            --field context='Deploy preview' \
            --field description="$deploy_description" \
            --field target_url="$RUN_URL"
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$RELEASE_SHA" \
            --field state="$smoke_state" \
            --field context='Preview smoke' \
            --field description="$smoke_description" \
            --field target_url="$RUN_URL"

  production:
    name: Promote and verify production
    needs: [deploy-preview, preview-smoke]
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: production
      cancel-in-progress: false
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Check out trusted promotion code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: 10.33.2
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install trusted promotion dependencies
        run: pnpm install --frozen-lockfile

      - name: Promote the verified preview without rebuilding
        env:
          DEPLOYMENT_URL: ${{ needs.deploy-preview.outputs.url }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          pnpm exec vercel promote "$DEPLOYMENT_URL" \
            --yes \
            --timeout=5m \
            --non-interactive \
            --no-color \
            --token="$VERCEL_TOKEN"

          echo "### Production promotion" >> "$GITHUB_STEP_SUMMARY"
          echo "Promoted $DEPLOYMENT_URL without rebuilding." >> "$GITHUB_STEP_SUMMARY"

      - name: Verify the promoted release identity in production
        env:
          BASE_URL: ${{ vars.PRODUCTION_URL }}
          EXPECTED_RELEASE: ${{ env.RELEASE_SHA }}
        run: node scripts/smoke-release.mjs
