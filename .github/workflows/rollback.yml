name: Rollback production

on:
  workflow_dispatch:
    inputs:
      deployment_url:
        description: Immutable Vercel deployment URL to promote
        required: true
        type: string
      expected_release:
        description: Full Git SHA embedded in that deployment
        required: true
        type: string
      reason:
        description: Why production is being rolled back
        required: true
        type: string

permissions:
  contents: read

env:
  CI: true
  HUSKY: 0

jobs:
  authorize:
    name: Authorize recovery from main
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Reject an untrusted workflow ref
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Rollback must be dispatched from main, not $GITHUB_REF" >&2
            exit 1
          fi

  rollback:
    name: Promote and verify known-good deployment
    needs: authorize
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: production
      cancel-in-progress: true
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Validate recovery inputs
        env:
          DEPLOYMENT_URL: ${{ inputs.deployment_url }}
          EXPECTED_RELEASE: ${{ inputs.expected_release }}
        run: |
          if [[ ! "$DEPLOYMENT_URL" =~ ^https://[a-zA-Z0-9.-]+\.vercel\.app$ ]]; then
            echo "deployment_url must be an immutable vercel.app URL" >&2
            exit 1
          fi

          if [[ ! "$EXPECTED_RELEASE" =~ ^[0-9a-f]{40}$ ]]; then
            echo "expected_release must be a full Git SHA" >&2
            exit 1
          fi

      - name: Check out trusted recovery code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: refs/heads/main

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10.33.2
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify an immutable ready deployment was selected
        env:
          DEPLOYMENT_URL: ${{ inputs.deployment_url }}
          EXPECTED_RELEASE: ${{ inputs.expected_release }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          inspection="$(
            pnpm exec vercel inspect "$DEPLOYMENT_URL" \
              --format=json \
              --non-interactive \
              --no-color \
              --token="$VERCEL_TOKEN"
          )"
          canonical_host="$(jq --exit-status --raw-output '.url' <<< "$inspection")"
          deployment_id="$(jq --exit-status --raw-output '.id' <<< "$inspection")"
          requested_host="${DEPLOYMENT_URL#https://}"
          requested_host="${requested_host%/}"
          ready_state="$(jq --exit-status --raw-output '.readyState' <<< "$inspection")"
          deployment_details="$(
            curl --silent --show-error --fail-with-body \
              --header "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$deployment_id?teamId=$VERCEL_ORG_ID"
          )"
          selected_project_id="$(
            jq --exit-status --raw-output '.projectId' <<< "$deployment_details"
          )"
          deployment_release="$(
            jq --raw-output '.meta.githubCommitSha // ""' <<< "$deployment_details"
          )"
          deployment_ref="$(
            jq --raw-output '.meta.githubCommitRef // ""' <<< "$deployment_details"
          )"

          if [[ "$requested_host" != "$canonical_host" ]]; then
            echo "$DEPLOYMENT_URL is a mutable alias; use https://$canonical_host" >&2
            exit 1
          fi

          if [[ "$ready_state" != "READY" ]]; then
            echo "$DEPLOYMENT_URL is not ready (state: $ready_state)" >&2
            exit 1
          fi

          if [[ "$selected_project_id" != "$VERCEL_PROJECT_ID" ]]; then
            echo "$DEPLOYMENT_URL does not belong to the configured project" >&2
            exit 1
          fi

          if [[ "$deployment_release" != "$EXPECTED_RELEASE" || "$deployment_ref" != "main" ]]; then
            echo "$DEPLOYMENT_URL was not created from the requested mainline release" >&2
            exit 1
          fi

          if ! git merge-base --is-ancestor "$EXPECTED_RELEASE" origin/main; then
            echo "$EXPECTED_RELEASE is not an ancestor of main" >&2
            exit 1
          fi

      - name: Verify the candidate before changing production
        env:
          BASE_URL: ${{ inputs.deployment_url }}
          EXPECTED_RELEASE: ${{ inputs.expected_release }}
          SMOKE_ATTEMPTS: 3
        run: node scripts/smoke-release.mjs

      - name: Promote the known-good deployment without rebuilding
        env:
          DEPLOYMENT_URL: ${{ inputs.deployment_url }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          pnpm exec vercel promote "$DEPLOYMENT_URL" \
            --yes \
            --timeout=5m \
            --non-interactive \
            --no-color \
            --token="$VERCEL_TOKEN"

      - name: Verify the recovered release identity in production
        env:
          BASE_URL: ${{ vars.PRODUCTION_URL }}
          EXPECTED_RELEASE: ${{ inputs.expected_release }}
        run: node scripts/smoke-release.mjs

      - name: Record recovery evidence
        if: success()
        env:
          DEPLOYMENT_URL: ${{ inputs.deployment_url }}
          EXPECTED_RELEASE: ${{ inputs.expected_release }}
          RECOVERY_REASON: ${{ inputs.reason }}
        run: |
          {
            echo "### Production rollback completed"
            echo "- Deployment: $DEPLOYMENT_URL"
            echo "- Release: $EXPECTED_RELEASE"
            echo "- Reason: $RECOVERY_REASON"
          } >> "$GITHUB_STEP_SUMMARY"
