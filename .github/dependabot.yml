version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Argentina/Buenos_Aires
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ready-for-agent
    commit-message:
      prefix: chore(deps)
    groups:
      non-breaking-tooling:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Argentina/Buenos_Aires
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ready-for-agent
    commit-message:
      prefix: ci(actions)
    groups:
      workflow-actions:
        patterns:
          - "*"
